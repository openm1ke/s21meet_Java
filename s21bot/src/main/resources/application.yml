server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

spring:
  application:
      name: s21bot

bot:
  token: ${BOT_TOKEN}
  admin: ${BOT_ADMIN}
  group: ${BOT_GROUP}
  group-invite-link: ${BOT_GROUP_INVITE_LINK}
  web-app-url: ${BOT_WEB_APP_URL:https://localhost:8085/}
  proxy:
    enabled: ${BOT_PROXY_ENABLED:false}
    type: ${BOT_PROXY_TYPE:SOCKS}
    host: ${BOT_PROXY_HOST:}
    port: ${BOT_PROXY_PORT:0}
  session:
    enabled: true
  page-size: 10
  notify:
    enabled: false

resilience4j:
  ratelimiter:
    instances:
      telegram:
        limitForPeriod: 25
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
  retry:
    instances:
      telegram:
        maxAttempts: 5
        waitDuration: 500ms
        ignoreExceptions:
          - org.telegram.telegrambots.meta.exceptions.TelegramApiRequestException
          - org.telegram.telegrambots.meta.exceptions.TelegramApiValidationException

logging:
  level:
    io.github.resilience4j: INFO

rocketchat:
  service:
    url: ${ROCKETCHAT_SERVICE_URL}

profile:
  service:
    url: ${PROFILE_SERVICE_URL}
