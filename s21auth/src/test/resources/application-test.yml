spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

security:
  crypto:
    key-base64: "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI="  # 32 bytes base64 encoded

token:
  scheduler:
    enabled: false
  uri: /auth/realms/EduPowerKeycloak/protocol/openid-connect/token

edu:
  login: test_login
  password: test_password

logging:
  level:
    root: WARN
