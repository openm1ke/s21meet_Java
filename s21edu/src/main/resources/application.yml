server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

spring:
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  datasource:
    url: ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}  # Автоматически обновлять схему БД на основе сущностей
    show-sql: false  # Логирование SQL-запросов
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false  # Форматировать SQL-запросы для удобства

edu:
  tokenEndpoint: ${TOKEN_ENDPOINT:}

bot.service.url: ${BOT_SERVICE_URL:}

resilience4j:
  ratelimiter:
    instances:
      platform:
        limitForPeriod: 30
        limitRefreshPeriod: 100ms
        timeoutDuration: 1s
  retry:
    instances:
      platform:
        maxAttempts: 3
        waitDuration: 200ms

logging:
  level:
    io.github.resilience4j: INFO

api.client.enabled: true
cluster.api.enabled: true
profile:
  api.enabled: true
  service.enabled: true
participant.api.enabled: true
graphql.api.enabled: true
event:
  scheduler:
    enabled: true
    fixed-delay: PT1M
notify:
  delivery:
    enabled: false
  scheduler:
    enabled: true
    fixed-delay: PT30S
campus:
  api.enabled: true
  service.enabled: true
  workplace:
    provider: ${CAMPUS_WORKPLACE_PROVIDER:graphql}  # rest или graphql (по умолчанию graphql)
  scheduler:
    enabled: true
    fixed-delay: PT30S
    participants-max-concurrency: 8
    timeout:
      clusters: PT20S
      participants: PT40S
