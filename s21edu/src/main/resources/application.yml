server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

spring:
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  datasource:
    url: ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}  # Автоматически обновлять схему БД на основе сущностей
    show-sql: false  # Логирование SQL-запросов
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false  # Форматировать SQL-запросы для удобства

edu:
  tokenEndpoint: ${TOKEN_ENDPOINT:}

bot.service.url: ${BOT_SERVICE_URL:}

resilience4j:
  ratelimiter:
    instances:
      platform:
        limitForPeriod: 30
        limitRefreshPeriod: 100ms
        timeoutDuration: 1s
  retry:
    instances:
      platform:
        maxAttempts: 3
        waitDuration: 200ms

logging:
  level:
    io.github.resilience4j: INFO

api:
  client:
    enabled: ${API_CLIENT_ENABLED:true}
  graphql:
    enabled: ${GRAPHQL_API_ENABLED:true}
  campus:
    enabled: ${CAMPUS_API_ENABLED:true}
  cluster:
    enabled: ${CLUSTER_API_ENABLED:true}
  participant:
    enabled: ${PARTICIPANT_API_ENABLED:true}
  project:
    enabled: ${PROJECT_API_ENABLED:true}
  coalition:
    enabled: ${COALITION_API_ENABLED:true}
profile:
  api.enabled: true
  service.enabled: true
coalition:
  provider: ${COALITION_PROVIDER:graphql}  # auto|graphql|rest
  refresh-ttl: ${COALITION_REFRESH_TTL:${GRAPHQL_COALITION_REFRESH_TTL:PT15M}}
  rest:
    fetch-member-count: ${COALITION_REST_FETCH_MEMBER_COUNT:false}
    page-size: ${COALITION_REST_PAGE_SIZE:1000}
projects:
  provider: ${PROJECTS_PROVIDER:graphql}  # auto|graphql|rest
  refresh-ttl: ${PROJECTS_REFRESH_TTL:${GRAPHQL_PROJECTS_REFRESH_TTL:PT15M}}
  rest:
    page-size: ${PROJECTS_REST_PAGE_SIZE:1000}
graphql:
event:
  scheduler:
    enabled: true
    fixed-delay: PT1M
notify:
  delivery:
    enabled: false
  scheduler:
    enabled: true
    fixed-delay: PT30S
campus:
  service.enabled: true
  workplace:
    provider: ${CAMPUS_WORKPLACE_PROVIDER:graphql}  # rest или graphql (по умолчанию graphql)
  scheduler:
    enabled: true
    fixed-delay: PT30S
    participants-max-concurrency: 8
    timeout:
      global: PT30S
      per-campus: PT60S
