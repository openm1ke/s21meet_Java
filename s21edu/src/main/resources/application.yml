server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create  # Автоматически обновлять схему БД на основе сущностей
    show-sql: false  # Логирование SQL-запросов
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false  # Форматировать SQL-запросы для удобства

edu:
  tokenEndpoint: http://localhost:8081/api/tokens/default

resilience4j:
  ratelimiter:
    instances:
      campusApi:
        limitForPeriod: 10
        limitRefreshPeriod: 100ms
        timeoutDuration: 1s

logging:
  level:
    io.github.resilience4j: INFO

participant.api.enabled: true
profile.service.enabled: true
profile.api.enabled: true
graphql.api.enabled: true
notify:
  service.enabled: true
  scheduler.enabled: true
  poll.fixed-delay: PT30S
message.service.enabled: true
token.service.enabled: true
cluster.api.enabled: true
api.client.enabled: true
campus:
  api.enabled: true
  service.enabled: true