databaseChangeLog:
  - changeSet:
      id: 017-create-student-credentials
      author: openmike
      changes:
        - createTable:
            tableName: student_credentials
            columns:
              - column:
                  name: login
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: VARCHAR(255)
              - column:
                  name: user_id
                  type: VARCHAR(255)
              - column:
                  name: school_id
                  type: VARCHAR(255)
              - column:
                  name: is_active
                  type: BOOLEAN
              - column:
                  name: is_graduate
                  type: BOOLEAN

  - changeSet:
      id: 018-index-student-credentials-user-id
      author: openmike
      changes:
        - createIndex:
            tableName: student_credentials
            indexName: idx_student_credentials_user_id
            columns:
              - column:
                  name: user_id
