databaseChangeLog:
  - changeSet:
      id: 001-create-cluster
      author: openmike
      changes:
        - createTable:
            tableName: cluster
            columns:
              - column:
                  name: cluster_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: capacity
                  type: INTEGER
              - column:
                  name: available_capacity
                  type: INTEGER
              - column:
                  name: floor
                  type: INTEGER
              - column:
                  name: campus_id
                  type: VARCHAR(255)

  - changeSet:
      id: 002-create-participant-campus
      author: openmike
      changes:
        - createTable:
            tableName: participant_campus
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: campus_name
                  type: VARCHAR(255)

  - changeSet:
      id: 003-create-participant
      author: openmike
      changes:
        - createTable:
            tableName: participant
            columns:
              - column:
                  name: login
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
              - column:
                  name: class_name
                  type: VARCHAR(255)
              - column:
                  name: parallel_name
                  type: VARCHAR(255)
              - column:
                  name: exp_value
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: level
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: exp_to_next_level
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: campus_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: participant
            baseColumnNames: campus_id
            referencedTableName: participant_campus
            referencedColumnNames: id
            constraintName: fk_participant_campus

  - changeSet:
      id: 004-create-workplace
      author: openmike
      changes:
        - createTable:
            tableName: workplace
            columns:
              - column:
                  name: cluster_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: row
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: number
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: login
                  type: VARCHAR(255)
              - column:
                  name: exp_value
                  type: INTEGER
              - column:
                  name: level_code
                  type: INTEGER
              - column:
                  name: stage_group_name
                  type: VARCHAR(255)
              - column:
                  name: stage_name
                  type: VARCHAR(255)
        - addPrimaryKey:
            tableName: workplace
            columnNames: cluster_id, row, number
            constraintName: pk_workplace
        - addForeignKeyConstraint:
            baseTableName: workplace
            baseColumnNames: cluster_id
            referencedTableName: cluster
            referencedColumnNames: cluster_id
            constraintName: fk_workplace_cluster

  - changeSet:
      id: 005-create-event
      author: openmike
      changes:
        - createTable:
            tableName: event
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: location
                  type: VARCHAR(255)
              - column:
                  name: start_date_time
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: end_date_time
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: organizers
                  type: VARCHAR(255) ARRAY
              - column:
                  name: capacity
                  type: INTEGER
              - column:
                  name: register_count
                  type: INTEGER

  - changeSet:
      id: 006-create-friends
      author: openmike
      changes:
        - createTable:
            tableName: friends
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: telegram_id
                  type: VARCHAR(255)
              - column:
                  name: login
                  type: VARCHAR(255)
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: is_friend
                  type: BOOLEAN
              - column:
                  name: is_subscribe
                  type: BOOLEAN
              - column:
                  name: is_favorite
                  type: BOOLEAN
              - column:
                  name: date
                  type: TIMESTAMP

  - changeSet:
      id: 007-create-online
      author: openmike
      changes:
        - createTable:
            tableName: online
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: login
                  type: VARCHAR(255)
              - column:
                  name: is_online
                  type: BOOLEAN

  - changeSet:
      id: 008-create-profile
      author: openmike
      changes:
        - createTable:
            tableName: profile
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: telegram_id
                  type: VARCHAR(255)
              - column:
                  name: s21login
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(255)
              - column:
                  name: last_command
                  type: TEXT

  - changeSet:
      id: 009-create-profile-validation
      author: openmike
      changes:
        - createTable:
            tableName: profile_validation
            columns:
              - column:
                  name: s21login
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: secret_code
                  type: VARCHAR(255)
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
