spring:
  liquibase:
    enabled: false
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:s21edu_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          time_zone: UTC
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
  sql:
    init:
      mode: always

participant.api.enabled: false
profile.service.enabled: false
profile.api.enabled: false
graphql.api.enabled: false
notify.service.enabled: false
cluster.api.enabled: false
api.client.enabled: false
campus:
  api.enabled: false
  service.enabled: false
