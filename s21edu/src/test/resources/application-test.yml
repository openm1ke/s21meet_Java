spring:
  liquibase:
    enabled: false
  task:
    scheduling:
      enabled: false
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:s21edu_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          time_zone: UTC
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
  sql:
    init:
      mode: always

api:
  participant:
    enabled: false
  project:
    enabled: false
  coalition:
    enabled: false
  graphql:
    enabled: false
  cluster:
    enabled: false
  client:
    enabled: false
  campus:
    enabled: false
profile.service.enabled: false
profile.api.enabled: false
notify.delivery.enabled: false
notify.scheduler.enabled: false
bot.service.url: http://localhost:18083
event:
  scheduler:
    enabled: false
campus:
  service.enabled: false
  scheduler:
    enabled: false
