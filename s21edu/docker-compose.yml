services:
  postgres:
    image: postgres:16
    container_name: s21_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - s21_pgdata:/var/lib/postgresql/data

volumes:
  s21_pgdata:
