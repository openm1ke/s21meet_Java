name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (example: sha-abc123456789)"
        required: true
        type: string
      image_repo:
        description: "Optional image repo prefix"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  gradle-tests:
    uses: ./.github/workflows/_tests-reusable.yml

  deploy-prod:
    needs: gradle-tests
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image repo
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.image_repo }}" ]]; then
            echo "image_repo=${{ inputs.image_repo }}" >> "$GITHUB_OUTPUT"
          else
            OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
            echo "image_repo=ghcr.io/${OWNER_LC}/s21meet" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_HOST="${{ vars.DEPLOY_HOST }}"
          DEPLOY_USER="${{ vars.DEPLOY_USER }}"
          PORT="${{ vars.DEPLOY_PORT }}"

          if [[ -z "$DEPLOY_HOST" ]]; then echo "DEPLOY_HOST var is required"; exit 1; fi
          if [[ -z "$DEPLOY_USER" ]]; then echo "DEPLOY_USER var is required"; exit 1; fi
          if [[ -z "$PORT" ]]; then PORT="22"; fi

          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [[ -n "${{ vars.DEPLOY_KNOWN_HOSTS }}" ]]; then
            echo "${{ vars.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            for attempt in 1 2 3 4 5; do
              if ssh-keyscan -T 10 -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
                break
              fi
              if [[ "$attempt" == "5" ]]; then
                echo "ssh-keyscan failed after 5 attempts"
                exit 1
              fi
              sleep 3
            done
          fi

      - name: Copy deploy files to prod host
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_HOST="${{ vars.DEPLOY_HOST }}"
          DEPLOY_USER="${{ vars.DEPLOY_USER }}"
          PORT="${{ vars.DEPLOY_PORT }}"
          if [[ -z "$PORT" ]]; then PORT="22"; fi
          APP_DIR="${{ vars.DEPLOY_APP_DIR }}"
          if [[ -z "$APP_DIR" ]]; then APP_DIR="/home/${DEPLOY_USER}/app"; fi
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o PubkeyAuthentication=yes
            -o PasswordAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o ConnectTimeout=15
            -o ConnectionAttempts=3
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=6
          )

          ssh "${SSH_OPTS[@]}" -p "$PORT" "$REMOTE" "mkdir -p \"$APP_DIR/scripts\" \"$APP_DIR/env/prod\""
          scp "${SSH_OPTS[@]}" -P "$PORT" docker-compose.yml "$REMOTE:$APP_DIR/docker-compose.yml"
          scp "${SSH_OPTS[@]}" -P "$PORT" scripts/deploy-compose.sh "$REMOTE:$APP_DIR/scripts/deploy-compose.sh"

      - name: Run prod deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_HOST="${{ vars.DEPLOY_HOST }}"
          DEPLOY_USER="${{ vars.DEPLOY_USER }}"
          PORT="${{ vars.DEPLOY_PORT }}"
          if [[ -z "$PORT" ]]; then PORT="22"; fi
          APP_DIR="${{ vars.DEPLOY_APP_DIR }}"
          if [[ -z "$APP_DIR" ]]; then APP_DIR="/home/${DEPLOY_USER}/app"; fi
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o PubkeyAuthentication=yes
            -o PasswordAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o ConnectTimeout=15
            -o ConnectionAttempts=3
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=6
          )

          ssh "${SSH_OPTS[@]}" -p "$PORT" "$REMOTE" "\
            set -euo pipefail; \
            cd \"$APP_DIR\"; \
            chmod +x scripts/deploy-compose.sh; \
            IMAGE_REPO='${{ steps.vars.outputs.image_repo }}' IMAGE_TAG='${{ inputs.image_tag }}' \
            scripts/deploy-compose.sh 'env/prod/compose.env' '' 'rolling'"
