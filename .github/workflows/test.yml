name: Test

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - develop
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gradle-tests:
    if: github.event_name != 'pull_request' || github.head_ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew runAllTests
