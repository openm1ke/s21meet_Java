name: Test PR

on:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gradle-tests:
    uses: ./.github/workflows/_tests-reusable.yml

  sonar-quality:
    name: Sonar Quality
    needs: gradle-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
    steps:
      - name: Skip Sonar when token is not configured
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured, skipping Sonar analysis."

      - name: Checkout
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v5

      - name: Setup Java 21
        if: env.SONAR_TOKEN != ''
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        if: env.SONAR_TOKEN != ''
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Prepare Sonar settings
        if: env.SONAR_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SONAR_HOST_URL:-}" ]]; then
            echo "SONAR_HOST_URL is not configured in repository variables"
            exit 1
          fi
          if [[ -z "${SONAR_ORGANIZATION:-}" ]]; then
            echo "SONAR_ORGANIZATION is not configured in repository variables"
            exit 1
          fi
          if [[ -z "${SONAR_PROJECT_KEY:-}" ]]; then
            echo "SONAR_PROJECT_KEY is not configured in repository variables"
            exit 1
          fi

          if [[ ! "${SONAR_HOST_URL}" =~ ^https?:// ]]; then
            echo "Invalid SONAR_HOST_URL: '${SONAR_HOST_URL}'. It must start with http:// or https://"
            exit 1
          fi

          echo "SONAR_HOST_URL=${SONAR_HOST_URL}" >> "$GITHUB_ENV"
          echo "SONAR_ORGANIZATION=${SONAR_ORGANIZATION}" >> "$GITHUB_ENV"
          echo "SONAR_PROJECT_KEY=${SONAR_PROJECT_KEY}" >> "$GITHUB_ENV"

      - name: Run Sonar analysis with coverage
        if: env.SONAR_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew runAllTestsWithCoverage sonar --parallel --max-workers=4 --build-cache --configuration-cache
