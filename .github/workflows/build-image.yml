name: Build Images

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string

jobs:
  gradle-tests:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    uses: ./.github/workflows/_tests-reusable.yml

  publish:
    needs: gradle-tests
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Ensure version tag exists after master merge
        if: github.event_name != 'workflow_dispatch' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(grep -E '^appVersion=' gradle.properties | cut -d'=' -f2- | tr -d '\r' | xargs)"
          if [[ -z "$app_version" ]]; then
            echo "Failed to resolve appVersion from gradle.properties"
            exit 1
          fi
          if [[ ! "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid appVersion for tag creation: '$app_version'"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          version_tag="v${app_version}"
          if git ls-remote --tags --refs origin "refs/tags/${version_tag}" | grep -q .; then
            echo "Tag ${version_tag} already exists, skip tag creation"
          else
            git tag -a "${version_tag}" -m "Release ${version_tag}"
            git push origin "refs/tags/${version_tag}"
          fi

      - name: Build jars
        run: ./gradlew :s21auth:bootJar :s21edu:bootJar :s21bot:bootJar :s21rocket:bootJar :s21web:bootJar

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="ghcr.io/${OWNER_LC}/s21meet"
          APP_VERSION="$(grep -E '^appVersion=' gradle.properties | cut -d'=' -f2- | tr -d '\r' | xargs)"
          if [[ -z "$APP_VERSION" ]]; then
            echo "Failed to resolve appVersion from gradle.properties"
            exit 1
          fi
          if [[ ! "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid appVersion for image metadata: '$APP_VERSION'"
            exit 1
          fi
          VERSION_TAG="v${APP_VERSION}"

          TAG_OVERRIDE="${{ github.event.inputs.image_tag || '' }}"
          if [[ -n "$TAG_OVERRIDE" ]]; then
            IMAGE_TAG="$TAG_OVERRIDE"
          else
            IMAGE_TAG="$VERSION_TAG"
          fi

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish build summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Build Images Summary"
            echo ""
            echo "- Image repository: \`${{ steps.meta.outputs.image_repo }}\`"
            echo "- Version tag from \`gradle.properties\`: \`${{ steps.meta.outputs.version_tag }}\`"
            echo "- Published image tag: \`${{ steps.meta.outputs.image_tag }}\`"
            echo ""
            echo "Deploy with tag: \`${{ steps.meta.outputs.image_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push s21auth
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./s21auth
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21auth:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21auth:latest

      - name: Build and push s21edu
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./s21edu
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21edu:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21edu:latest

      - name: Build and push s21edu-migrator
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./s21edu
          file: ./s21edu/migrator.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21edu-migrator:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21edu-migrator:latest

      - name: Build and push s21bot
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./s21bot
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21bot:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21bot:latest

      - name: Build and push s21rocket
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./s21rocket
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21rocket:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21rocket:latest

      - name: Build and push s21web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./s21web
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21web:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21web:latest
