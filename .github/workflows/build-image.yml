name: Build Images

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  gradle-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew runAllTests

  publish:
    needs: gradle-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build jars
        run: ./gradlew :s21auth:bootJar :s21edu:bootJar :s21bot:bootJar :s21rocket:bootJar

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="ghcr.io/${OWNER_LC}/s21meet"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"

          TAG_OVERRIDE="${{ github.event.inputs.image_tag || '' }}"
          if [[ -n "$TAG_OVERRIDE" ]]; then
            SHA_TAG="$TAG_OVERRIDE"
          else
            SHA_TAG="sha-${SHORT_SHA}"
          fi

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push s21auth
        uses: docker/build-push-action@v6
        with:
          context: ./s21auth
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21auth:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21auth:latest

      - name: Build and push s21edu
        uses: docker/build-push-action@v6
        with:
          context: ./s21edu
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21edu:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21edu:latest

      - name: Build and push s21edu-migrator
        uses: docker/build-push-action@v6
        with:
          context: ./s21edu
          file: ./s21edu/migrator.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21edu-migrator:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21edu-migrator:latest

      - name: Build and push s21bot
        uses: docker/build-push-action@v6
        with:
          context: ./s21bot
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21bot:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21bot:latest

      - name: Build and push s21rocket
        uses: docker/build-push-action@v6
        with:
          context: ./s21rocket
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/s21rocket:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/s21rocket:latest
