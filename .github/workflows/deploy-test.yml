name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (example: v1.2.3 or latest)"
        required: true
        type: string
      image_repo:
        description: "Optional image repo prefix"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-test
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  gradle-tests:
    uses: ./.github/workflows/_tests-reusable.yml

  deploy-test:
    needs: gradle-tests
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image repo
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.image_repo }}" ]]; then
            echo "image_repo=${{ inputs.image_repo }}" >> "$GITHUB_OUTPUT"
          else
            OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
            echo "image_repo=ghcr.io/${OWNER_LC}/s21meet" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_HOST="${{ vars.DEPLOY_HOST }}"
          DEPLOY_USER="${{ vars.DEPLOY_USER }}"
          PORT="${{ vars.DEPLOY_PORT }}"

          if [[ -z "$DEPLOY_HOST" ]]; then echo "DEPLOY_HOST var is required"; exit 1; fi
          if [[ -z "$DEPLOY_USER" ]]; then echo "DEPLOY_USER var is required"; exit 1; fi
          if [[ -z "$PORT" ]]; then PORT="22"; fi

          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${{ vars.DEPLOY_KNOWN_HOSTS }}" ]]; then
            echo "${{ vars.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            for attempt in 1 2 3 4 5; do
              if ssh-keyscan -T 10 -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
                break
              fi
              if [[ "$attempt" == "5" ]]; then
                echo "ssh-keyscan failed after 5 attempts"
                exit 1
              fi
              sleep 3
            done
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Copy deploy files to test host
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_HOST="${{ vars.DEPLOY_HOST }}"
          DEPLOY_USER="${{ vars.DEPLOY_USER }}"
          PORT="${{ vars.DEPLOY_PORT }}"
          APP_DIR="${{ vars.DEPLOY_APP_DIR }}"

          if [[ -z "$PORT" ]]; then PORT="22"; fi
          if [[ -z "$APP_DIR" ]]; then APP_DIR="/home/${DEPLOY_USER}/app"; fi

          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o PubkeyAuthentication=yes
            -o PasswordAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o ConnectTimeout=15
            -o ConnectionAttempts=3
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=6
          )

          echo "Local workspace:"
          pwd
          ls -la

          test -f ./docker-compose.yml
          test -f ./scripts/deploy-compose.sh
          test -f ./monitoring/prometheus/prometheus.yml
          test -d ./monitoring/grafana/provisioning

          ssh "${SSH_OPTS[@]}" -p "$PORT" "$REMOTE" "
            set -euo pipefail

            mkdir -p \
              \"$APP_DIR\" \
              \"$APP_DIR/scripts\" \
              \"$APP_DIR/env/test\" \
              \"$APP_DIR/monitoring/prometheus\" \
              \"$APP_DIR/monitoring/grafana\"

            rm -f \"$APP_DIR/docker-compose.yml\"
            rm -f \"$APP_DIR/scripts/deploy-compose.sh\"
            rm -f \"$APP_DIR/monitoring/prometheus/prometheus.yml\"
            rm -rf \"$APP_DIR/monitoring/grafana/provisioning\"
          "

          scp "${SSH_OPTS[@]}" -P "$PORT" ./docker-compose.yml \
            "$REMOTE:$APP_DIR/docker-compose.yml"

          scp "${SSH_OPTS[@]}" -P "$PORT" ./scripts/deploy-compose.sh \
            "$REMOTE:$APP_DIR/scripts/deploy-compose.sh"

          scp "${SSH_OPTS[@]}" -P "$PORT" ./monitoring/prometheus/prometheus.yml \
            "$REMOTE:$APP_DIR/monitoring/prometheus/prometheus.yml"

          scp "${SSH_OPTS[@]}" -r -P "$PORT" ./monitoring/grafana/provisioning \
            "$REMOTE:$APP_DIR/monitoring/grafana/"

          ssh "${SSH_OPTS[@]}" -p "$PORT" "$REMOTE" "
            set -euo pipefail

            chmod +x \"$APP_DIR/scripts/deploy-compose.sh\"

            echo 'Remote files after copy:'
            ls -la \"$APP_DIR\"
            ls -la \"$APP_DIR/scripts\"
            ls -la \"$APP_DIR/monitoring/prometheus\"
            ls -la \"$APP_DIR/monitoring/grafana\"
            ls -la \"$APP_DIR/monitoring/grafana/provisioning\"
          "

      - name: Run test deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_HOST="${{ vars.DEPLOY_HOST }}"
          DEPLOY_USER="${{ vars.DEPLOY_USER }}"
          PORT="${{ vars.DEPLOY_PORT }}"
          APP_DIR="${{ vars.DEPLOY_APP_DIR }}"

          if [[ -z "$PORT" ]]; then PORT="22"; fi
          if [[ -z "$APP_DIR" ]]; then APP_DIR="/home/${DEPLOY_USER}/app"; fi

          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o PubkeyAuthentication=yes
            -o PasswordAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o ConnectTimeout=15
            -o ConnectionAttempts=3
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=6
          )

          ssh "${SSH_OPTS[@]}" -p "$PORT" "$REMOTE" "
            set -euo pipefail
            cd \"$APP_DIR\"
            chmod +x scripts/deploy-compose.sh
            IMAGE_REPO='${{ steps.vars.outputs.image_repo }}' IMAGE_TAG='${{ inputs.image_tag }}' \
            scripts/deploy-compose.sh 'env/test/compose.env' 'infra' 'recreate-all'
          "
