name: Secret Scan PR

on:
  pull_request:
    branches:
      - develop
      - master

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: gitleaks-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # gitleaks-action builds a git range (base^..head) for pull_request events.
          # Full history is required so both commits always exist locally.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force base commit from current PR metadata.
          # This avoids stale "first commit in PR" SHAs after history rewrites.
          BASE_REF: ${{ github.event.pull_request.base.sha }}
