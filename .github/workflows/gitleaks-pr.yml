name: Secret Scan PR

on:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: gitleaks-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
