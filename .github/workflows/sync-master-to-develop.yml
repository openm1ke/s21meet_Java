name: Sync Master To Develop

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-master-to-develop
  cancel-in-progress: true

jobs:
  open-sync-pr:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse PR master -> develop
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:master`;
            const base = "develop";
            let pr;

            const { data: openPulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 10,
            });

            if (openPulls.length > 0) {
              pr = openPulls[0];
              core.info(`PR already exists: #${pr.number}`);
            } else {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                head: "master",
                base: "develop",
                title: "chore: sync master into develop",
                body: "Auto-created after push to `master` to keep `develop` in sync with release commits.",
              });
              pr = created.data;
              core.info(`Created PR #${pr.number}: ${pr.html_url}`);
            }

            const current = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });
            pr = current.data;

            // GitHub may report mergeability asynchronously right after PR creation.
            for (let attempt = 1; attempt <= 6; attempt++) {
              const refreshed = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });
              pr = refreshed.data;

              core.info(
                `Attempt ${attempt}: mergeable=${String(pr.mergeable)}, mergeable_state=${pr.mergeable_state}`
              );

              if (pr.merged) {
                core.info(`PR #${pr.number} already merged`);
                return;
              }

              if (pr.mergeable === true && pr.mergeable_state === "clean") {
                const merged = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: "merge",
                });
                core.info(`PR merged immediately: ${merged.data.sha}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, 3000));
            }

            await github.graphql(
              `mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId
                  mergeMethod: MERGE
                }) {
                  pullRequest { number }
                }
              }`,
              { pullRequestId: pr.node_id }
            );
            core.info(`Auto-merge enabled for PR #${pr.number}`);
