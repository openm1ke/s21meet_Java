name: Sync Master To Develop

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sync-master-to-develop
  cancel-in-progress: true

jobs:
  open-sync-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse PR master -> develop
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:master`;
            const base = "develop";

            const { data: openPulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 10,
            });

            if (openPulls.length > 0) {
              core.info(`PR already exists: #${openPulls[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              head: "master",
              base: "develop",
              title: "chore: sync master into develop",
              body: "Auto-created after push to `master` to keep `develop` in sync with release commits.",
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
