services:
  postgres:
    profiles: ["infra"]
    image: postgres:15
    restart: unless-stopped
    environment:
      TZ: UTC
    env_file:
      - ./env/${APP_ENV:-test}/postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - s21meet-network

  s21auth:
    image: ${IMAGE_REPO:-s21meet}/s21auth:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ./env/${APP_ENV:-test}/s21auth.env
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
    ports:
      - "${S21AUTH_BIND_ADDR:-127.0.0.1}:8081:8081"
    networks:
      - s21meet-network

  s21edu:
    image: ${IMAGE_REPO:-s21meet}/s21edu:${IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      s21auth:
        condition: service_healthy
    env_file:
      - ./env/${APP_ENV:-test}/s21edu.env
    environment:
      TZ: UTC
      SPRING_LIQUIBASE_ENABLED: false
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
    ports:
      - "${S21EDU_BIND_ADDR:-127.0.0.1}:8082:8082"
    networks:
      - s21meet-network

  s21edu-migrator:
    image: ${IMAGE_REPO:-s21meet}/s21edu-migrator:${IMAGE_TAG:-local}
    restart: "no"
    env_file:
      - ./env/${APP_ENV:-test}/s21edu.env
    entrypoint:
      - /bin/sh
      - -ec
      - |
        liquibase --search-path=/liquibase/changelog \
          --url="$$DB_URL" \
          --username="$$DB_USER" \
          --password="$$DB_PASSWORD" \
          --changelog-file=db/changelog/db.changelog-master.yaml \
          update
    networks:
      - s21meet-network

  s21bot:
    image: ${IMAGE_REPO:-s21meet}/s21bot:${IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      s21edu:
        condition: service_healthy
      s21rocket:
        condition: service_healthy
    env_file:
      - ./env/${APP_ENV:-test}/s21bot.env
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
    ports:
      - "${S21BOT_BIND_ADDR:-127.0.0.1}:8083:8083"
    networks:
      - s21meet-network

  s21rocket:
    image: ${IMAGE_REPO:-s21meet}/s21rocket:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ./env/${APP_ENV:-test}/s21rocket.env
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
    ports:
      - "${S21ROCKET_BIND_ADDR:-127.0.0.1}:8084:8084"
    networks:
      - s21meet-network

  xray-client:
    profiles: ["proxy-vless"]
    image: ghcr.io/xtls/xray-core:latest
    restart: unless-stopped
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - ${XRAY_CONFIG_FILE:-./env/test/xray/config.json.example}:/etc/xray/config.json:ro
    networks:
      s21meet-network:
        aliases:
          - telegram-proxy
    expose:
      - "1080"

  ssh-socks-client:
    profiles: ["proxy-ssh"]
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.20
        RUN apk add --no-cache openssh-client autossh
        COPY scripts/proxy/ssh-socks-entrypoint.sh /entrypoint.sh
        RUN chmod +x /entrypoint.sh
        ENTRYPOINT ["/entrypoint.sh"]
    restart: unless-stopped
    environment:
      FR_HOST: ${SSH_TUNNEL_HOST:-}
      FR_PORT: ${SSH_TUNNEL_PORT:-22}
      FR_USER: ${SSH_TUNNEL_USER:-}
      TUNNEL_SOCKS_PORT: ${SSH_TUNNEL_SOCKS_PORT:-1080}
      SSH_KEY_PATH: /run/secrets/ssh_private_key
      SSH_KNOWN_HOSTS_PATH: /run/secrets/ssh_known_hosts
    volumes:
      - ${SSH_TUNNEL_KEY_FILE:-./env/test/ssh/id_ed25519}:/run/secrets/ssh_private_key:ro
      - ${SSH_TUNNEL_KNOWN_HOSTS_FILE:-./env/test/ssh/known_hosts}:/run/secrets/ssh_known_hosts:ro
    expose:
      - "${SSH_TUNNEL_SOCKS_PORT:-1080}"
    networks:
      s21meet-network:
        aliases:
          - telegram-proxy

  prometheus:
    profiles: ["infra"]
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_BIND_ADDR:-127.0.0.1}:9090:9090"
    networks:
      - s21meet-network

  grafana:
    profiles: ["infra"]
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_BIND_ADDR:-0.0.0.0}:3001:3000"
    networks:
      - s21meet-network

networks:
  s21meet-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
